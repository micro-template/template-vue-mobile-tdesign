<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1, minimum-scale=1"
    />
    <!-- 缓存配置核心标签 -->
    <!-- 缓存1天 -->
    <meta http-equiv="Cache-Control" content="public, max-age=86400" />
    <!-- 兼容老浏览器 -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light dark" />

    <!-- 禁止不必要的预渲染 -->
    <meta name="robots" content="noarchive, noimageindex" />
    <!-- 可选：锁定屏幕方向为竖屏（根据需求开启） -->
    <meta name="screen-orientation" content="portrait" />
    <!-- 适配微信 X5 内核 -->
    <meta name="x5-orientation" content="portrait" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <style>
      /* 全局禁止长按选中、禁止拖拽图片 */
      * {
        -webkit-user-select: none; /* 禁止选中文本 */
        user-select: none;
        -webkit-touch-callout: none; /* 禁止长按菜单 */
        -webkit-user-drag: none; /* 禁止拖拽图片 */
        tap-highlight-color: transparent; /* 禁止点击高亮 */
        -webkit-tap-highlight-color: transparent;
      }
    </style>
    <title>Vite App</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
